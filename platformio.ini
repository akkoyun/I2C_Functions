; Minimal PlatformIO project for local validation and IntelliSense.
[platformio]
	src_dir = examples/Device_Control
	default_envs = uno, esp32dev

; Shared environment settings for validating the example against the local library.
[env]
	lib_deps =
		symlink://.

; Reference AVR environment for validating the example sketch.
[env:uno]
	platform = atmelavr
	board = uno
	framework = arduino
	monitor_speed = 115200

; Secondary ESP32 environment for cross-platform validation.
[env:esp32dev]
	platform = espressif32
	board = esp32dev
	framework = arduino
	monitor_speed = 115200