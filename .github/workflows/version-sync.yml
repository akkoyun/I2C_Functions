name: Version Sync

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-version-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify version synchronization
        run: |
          sh scripts/sync-version.sh
          git diff --exit-code -- VERSION README.md src/Definition.h library.properties library.json